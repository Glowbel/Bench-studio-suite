name: Build Filigree NotallyX Debug APK

on:
  push:
    branches: [claude/notally-special-session-4WOhd]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -1)
          echo "sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses || true
          yes | "$SDKMANAGER" "platforms;android-36" "build-tools;35.0.0" "ndk;29.0.13113456"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('notally/**/*.gradle*', 'notally/**/gradle-wrapper.properties') }}

      - name: Build debug APK
        working-directory: notally
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PRELEASE_STORE_FILE=/dev/null \
            -PRELEASE_STORE_PASSWORD=dummy \
            -PRELEASE_KEY_ALIAS=dummy \
            -PRELEASE_KEY_PASSWORD=dummy \
            -PDEEPL_API_KEY=dummy \
            -x installLocalGitHooks \
            -x exportTranslationsToExcel \
            --no-daemon \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: notally-filigree-debug
          path: notally/app/build/outputs/apk/debug/*.apk
          retention-days: 30
