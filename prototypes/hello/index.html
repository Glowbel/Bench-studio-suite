<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Hello Prototype</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #16171b;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .phone {
        width: 390px;
        height: 844px;
        max-width: 100%;
        background: #1c1d22;
        border: 1px solid #3d4858;
        border-radius: 44px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .viewport {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 56px 28px 40px;
        color: #d8dfdc;
      }
      h1 {
        font-weight: 500;
        font-size: 1.7rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #8a9692;
        line-height: 1.5;
        margin: 0 0 1.5rem;
      }
      button {
        font: inherit;
        color: #d8dfdc;
        background: transparent;
        border: 1px solid rgba(61, 72, 88, 0.8);
        border-radius: 10px;
        padding: 0.7rem 1.2rem;
        cursor: pointer;
      }
      button:active {
        border-color: #4acc85;
        color: #4acc85;
      }
      .toast {
        position: absolute;
        left: 50%;
        bottom: 48px;
        transform: translateX(-50%);
        background: #2a2c33;
        color: #d8dfdc;
        border: 1px solid #3d4858;
        border-radius: 10px;
        padding: 0.6rem 1rem;
        font-size: 0.9rem;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="viewport">
        <h1>Hello, prototype</h1>
        <p>
          This is the sample prototype. It is a single self-contained HTML
          file wrapped in a 390x844 iPhone frame — the shape every prototype
          in this folder takes. Mock data only, illustrative interactions.
        </p>
        <button id="tap">Tap me</button>
      </div>
      <div class="toast" id="toast">Would open a real screen</div>
    </div>
    <script>
      (function () {
        var btn = document.getElementById('tap');
        var toast = document.getElementById('toast');
        var timer = null;
        btn.addEventListener('click', function () {
          toast.classList.add('show');
          if (timer) clearTimeout(timer);
          timer = setTimeout(function () {
            toast.classList.remove('show');
          }, 1600);
        });
      })();
    </script>
  </body>
</html>
