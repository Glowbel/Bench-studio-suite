<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Prototype Template</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #16171b;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .phone {
        position: relative;
        width: 390px;
        height: 844px;
        max-width: 100%;
        background: #1c1d22;
        border: 1px solid #3d4858;
        border-radius: 44px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .viewport {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 56px 28px 40px;
        color: #d8dfdc;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="viewport">
        <!-- prototype content goes here -->
      </div>
    </div>
    <script>

    </script>
  </body>
</html>
