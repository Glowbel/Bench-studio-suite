<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design Lab — Bench Studio Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 72% 18%, rgba(95, 213, 193, 0.055), transparent 60%),
        radial-gradient(ellipse 65% 50% at 18% 88%, rgba(124, 68, 184, 0.065), transparent 60%),
        #1c1d22;
      color: #d8dfdc;
      font-family: "Cormorant Garamond", Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 40px 120px;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .eyebrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5e6a66;
    }

    .title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 500;
      font-size: 42px;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: #f3f6f5;
    }

    .sub {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-size: 17px;
      color: #5e6a66;
      margin-top: 4px;
    }

    /* Divider */
    .rule {
      height: 1px;
      background: linear-gradient(90deg,
        rgba(95, 213, 193, 0.48) 0%,
        rgba(95, 213, 193, 0.10) 60%,
        transparent 100%);
      box-shadow: 0 0 10px rgba(95, 213, 193, 0.20);
    }

    /* Demo list */
    .demos {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .demos-label {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-variant: small-caps;
      font-weight: 500;
      letter-spacing: 0.18em;
      font-size: 11px;
      color: #5e6a66;
      margin-bottom: 16px;
    }

    .demo-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 22px;
      background: #232531;
      border: 1px solid rgba(61, 72, 88, 0.40);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: background 240ms cubic-bezier(0.25, 0.8, 0.25, 1),
                  border-color 240ms cubic-bezier(0.25, 0.8, 0.25, 1),
                  box-shadow 240ms cubic-bezier(0.25, 0.8, 0.25, 1),
                  transform 240ms cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: inset 0 0 24px rgba(95, 213, 193, 0.05);
    }
    .demo-link:hover {
      background: #2c2f42;
      border-color: rgba(95, 213, 193, 0.28);
      box-shadow: inset 0 0 28px rgba(95, 213, 193, 0.12),
                  0 4px 16px rgba(0, 0, 0, 0.35);
      transform: translateY(-1px);
    }

    .demo-left { display: flex; flex-direction: column; gap: 5px; }

    .demo-name {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 500;
      font-size: 20px;
      color: #f3f6f5;
    }

    .demo-desc {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: #8a9692;
    }

    .demo-tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: #4acc85;
      text-transform: uppercase;
      padding: 3px 10px;
      border: 1px solid rgba(95, 213, 193, 0.28);
      border-radius: 9999px;
      background: rgba(15, 90, 82, 0.25);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .demo-arrow {
      font-size: 18px;
      color: #4c537a;
      flex-shrink: 0;
      transition: color 240ms, transform 240ms cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .demo-link:hover .demo-arrow {
      color: #4acc85;
      transform: translateX(3px);
    }

    /* Footer */
    .foot {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-size: 13px;
      color: #4c537a;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <div class="eyebrow">bench studio suite · design lab</div>
      <div class="title">Design Explorations</div>
      <div class="sub">Live samples. Elements before they ship.</div>
    </div>

    <div class="rule"></div>

    <div class="demos">
      <div class="demos-label">active explorations</div>

      <a class="demo-link" href="./bench/">
        <div class="demo-left">
          <div class="demo-name">Bench × Filigree — Fusion Lab</div>
          <div class="demo-desc">Controls, dividers, bezel surfaces, heraldic mark in three metal states.</div>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
          <span class="demo-tag">bench</span>
          <span class="demo-arrow">&#8594;</span>
        </div>
      </a>
    </div>

    <div class="foot">More explorations added as the suite grows.</div>

  </div>
</body>
</html>
