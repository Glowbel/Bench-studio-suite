<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); border: 1px solid var(--border); position: relative; }
  .glow { position: absolute; inset: 0; border-radius: inherit; box-shadow: inset 0 0 22px rgba(74,204,133,0.22); pointer-events: none; }
</style></head>
<body>
  <div class="scale">
    <div><div class="sw" style="background: var(--teal-100)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">teal-100</span><span class="swatch-hex">#CCF2D5</span></div></div>
    <div><div class="sw" style="background: var(--teal-200)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">teal-200</span><span class="swatch-hex">#95E5B0</span></div></div>
    <div><div class="sw" style="background: var(--teal-300)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">teal-300 · alive</span><span class="swatch-hex">#4ACC85</span></div></div>
    <div><div class="sw" style="background: var(--teal-500)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">teal-500</span><span class="swatch-hex">#168258</span></div></div>
    <div><div class="sw" style="background: var(--teal-700)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">teal-700</span><span class="swatch-hex">#094428</span></div></div>
    <div><div class="sw" style="background: var(--teal-900)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">teal-900</span><span class="swatch-hex">#051A10</span></div></div>
  </div>
</body></html>
