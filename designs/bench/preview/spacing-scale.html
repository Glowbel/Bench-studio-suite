<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 26px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: end; gap: 14px; }
  .col-i { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--teal-700); border-radius: 2px; width: 22px;
         box-shadow: inset 0 0 12px rgba(95,213,193,0.4); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .val  { font-family: var(--font-mono); font-size: 9px; color: var(--fg-faint); }
</style></head>
<body>
  <div class="row">
    <div class="col-i"><div class="bar" style="height: 4px"></div>  <div class="name">1</div><div class="val">4px</div></div>
    <div class="col-i"><div class="bar" style="height: 8px"></div>  <div class="name">2</div><div class="val">8px</div></div>
    <div class="col-i"><div class="bar" style="height: 12px"></div> <div class="name">3</div><div class="val">12px</div></div>
    <div class="col-i"><div class="bar" style="height: 16px"></div> <div class="name">4</div><div class="val">16px</div></div>
    <div class="col-i"><div class="bar" style="height: 24px"></div> <div class="name">5</div><div class="val">24px</div></div>
    <div class="col-i"><div class="bar" style="height: 32px"></div> <div class="name">6</div><div class="val">32px</div></div>
    <div class="col-i"><div class="bar" style="height: 48px"></div> <div class="name">7</div><div class="val">48px</div></div>
    <div class="col-i"><div class="bar" style="height: 64px"></div> <div class="name">8</div><div class="val">64px</div></div>
    <div class="col-i"><div class="bar" style="height: 96px"></div> <div class="name">9</div><div class="val">96px</div></div>
    <div class="col-i"><div class="bar" style="height: 128px"></div><div class="name">10</div><div class="val">128px</div></div>
  </div>
  <div style="font-family: var(--font-display); font-style: italic; font-size: 13px; color: var(--fg-subtle);">
    Base 4 — gaps of 24, 32, 48 carry the rhythm of most layouts.
  </div>
</body></html>
