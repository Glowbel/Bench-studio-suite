<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); border: 1px solid var(--border); position: relative; }
  .sw::after { content: ""; position: absolute; inset: 0; border-radius: inherit;
               box-shadow: inset 0 0 18px rgba(95,213,193,0.04); pointer-events: none; }
</style></head>
<body>
  <div class="scale">
    <div>
      <div class="sw" style="background: var(--ink-950)"></div>
      <div class="swatch-label"><span class="swatch-name">ink-950 · graphite</span><span class="swatch-hex">#1C1D22</span></div>
    </div>
    <div>
      <div class="sw" style="background: var(--ink-900)"></div>
      <div class="swatch-label"><span class="swatch-name">ink-900</span><span class="swatch-hex">#232531</span></div>
    </div>
    <div>
      <div class="sw" style="background: var(--ink-800)"></div>
      <div class="swatch-label"><span class="swatch-name">ink-800</span><span class="swatch-hex">#2C2F42</span></div>
    </div>
    <div>
      <div class="sw" style="background: var(--ink-700)"></div>
      <div class="swatch-label"><span class="swatch-name">ink-700</span><span class="swatch-hex">#353953</span></div>
    </div>
    <div>
      <div class="sw" style="background: var(--ink-600)"></div>
      <div class="swatch-label"><span class="swatch-name">ink-600</span><span class="swatch-hex">#404663</span></div>
    </div>
    <div>
      <div class="sw" style="background: var(--ink-500)"></div>
      <div class="swatch-label"><span class="swatch-name">ink-500 · dusk</span><span class="swatch-hex">#4C537A</span></div>
    </div>
  </div>
</body></html>
