<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 26px; display: flex; align-items: center; justify-content: space-around; gap: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 86px; height: 64px; background: var(--ink-800);
         border: 1px solid var(--border);
         box-shadow: var(--bezel-teal); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .val  { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); }
</style></head>
<body>
  <div class="cell"><div class="box" style="border-radius: 4px"></div>      <div class="name">--radius-sm</div><div class="val">4px</div></div>
  <div class="cell"><div class="box" style="border-radius: 8px"></div>      <div class="name">--radius-md</div><div class="val">8px</div></div>
  <div class="cell"><div class="box" style="border-radius: 12px"></div>     <div class="name">--radius-lg</div><div class="val">12px</div></div>
  <div class="cell"><div class="box" style="border-radius: 20px"></div>     <div class="name">--radius-xl</div><div class="val">20px</div></div>
  <div class="cell"><div class="box" style="border-radius: 9999px; width: 64px;"></div><div class="name">--radius-full</div><div class="val">pill</div></div>
</body></html>
