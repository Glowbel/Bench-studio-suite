<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 26px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px 18px; align-items: start; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .ic {
    width: 38px; height: 38px;
    color: var(--mist-200);
    display: inline-flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.18));
  }
  .ic svg { width: 100%; height: 100%; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); }

  /* Layer 1 — ghost: a faint solid trace, so the dots ride a path you can almost see */
  .ic svg .ghost { stroke-width: 0.6; opacity: 0.18; }

  /* Layer 2 — dot: animated dashes flowing along the same path */
  .ic svg .dot {
    stroke-width: 1.0;
    stroke-dasharray: 0.6 3.5;
    animation: flow 4s linear infinite;
  }
  .ic svg .dot.slow {
    stroke-width: 0.8;
    stroke-dasharray: 0.5 3;
    opacity: 0.75;
    animation-duration: 5s;
  }
  @keyframes flow {
    0%   { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -16; }
  }

  /* Layer 3 — VEIL: translucent solid overlay.
     Matches the primary stroke weight so the icon reads as one solid
     piece at a glance; the flowing dots animate beneath. */
  .ic svg .veil {
    stroke-width: 1.7;
    opacity: 0.38;
  }
  .ic svg .veil.thin { stroke-width: 1.5; opacity: 0.32; }

  /* Glowing dots */
  .ic svg .spark { animation: spark-pulse 3s ease-in-out infinite; }
  .ic svg .spark.s2 { animation-delay: 1.5s; }
  @keyframes spark-pulse {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 1; }
  }
</style>
</head>
<body>

  <!--
    Layer order per icon (back → front):
       1. .ghost  — faint solid path beneath
       2. .dot    — animated dotted overlay
       3. .veil   — translucent solid overlay on top
    Solid primary strokes (the main shape) live at full opacity.
  -->

  <!-- SEARCH -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="6.5" stroke-width="1.7"/>
        <path class="ghost" d="M 15.8 15.8 L 20.6 20.4"/>
        <path class="dot"   d="M 15.8 15.8 L 20.6 20.4"/>
        <path class="veil"  d="M 15.8 15.8 L 20.6 20.4"/>
        <circle class="spark" cx="20.6" cy="20.4" r="0.8" fill="currentColor"/>
        <circle class="spark s2" cx="3" cy="6" r="0.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">search</div>
  </div>

  <!-- BEGIN -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="4.5" x2="12" y2="19.5" stroke-width="1.7"/>
        <line class="ghost" x1="4.5" y1="12" x2="19.5" y2="12"/>
        <line class="dot"   x1="4.5" y1="12" x2="19.5" y2="12"/>
        <line class="veil"  x1="4.5" y1="12" x2="19.5" y2="12"/>
        <circle class="spark" cx="12" cy="4.5" r="0.7" fill="currentColor"/>
        <circle class="spark s2" cx="12" cy="19.5" r="0.7" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">begin</div>
  </div>

  <!-- BACK -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="20" y2="12" stroke-width="1.7"/>
        <path class="ghost" d="M 11 5.5 Q 7.5 8.7, 5 12 Q 7.5 15.3, 11 18.5"/>
        <path class="dot"   d="M 11 5.5 Q 7.5 8.7, 5 12 Q 7.5 15.3, 11 18.5"/>
        <path class="veil"  d="M 11 5.5 Q 7.5 8.7, 5 12 Q 7.5 15.3, 11 18.5"/>
        <circle class="spark" cx="20" cy="12" r="0.8" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">back</div>
  </div>

  <!-- HELD (check) -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 9 17.5 Q 14 11, 20 5" stroke-width="1.7"/>
        <path class="ghost" d="M 3.5 12.5 Q 6 14.8, 9 17.5"/>
        <path class="dot"   d="M 3.5 12.5 Q 6 14.8, 9 17.5"/>
        <path class="veil"  d="M 3.5 12.5 Q 6 14.8, 9 17.5"/>
        <circle class="spark" cx="20" cy="5" r="0.9" fill="currentColor"/>
        <circle class="spark s2" cx="17" cy="3" r="0.4" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">held</div>
  </div>

  <!-- CLOSE -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="6" y1="6" x2="18" y2="18" stroke-width="1.7"/>
        <line class="ghost" x1="18" y1="6" x2="6" y2="18"/>
        <line class="dot"   x1="18" y1="6" x2="6" y2="18"/>
        <line class="veil"  x1="18" y1="6" x2="6" y2="18"/>
        <circle class="spark" cx="6" cy="6" r="0.7" fill="currentColor"/>
        <circle class="spark s2" cx="18" cy="18" r="0.7" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">close</div>
  </div>

  <!-- SETTINGS -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <g stroke-width="1.7">
          <ellipse cx="12" cy="4.5" rx="1.8" ry="2.5"/>
          <ellipse cx="12" cy="19.5" rx="1.8" ry="2.5"/>
          <ellipse cx="5" cy="8.25" rx="2.5" ry="1.8" transform="rotate(60 5 8.25)"/>
          <ellipse cx="19" cy="8.25" rx="2.5" ry="1.8" transform="rotate(-60 19 8.25)"/>
          <ellipse cx="5" cy="15.75" rx="2.5" ry="1.8" transform="rotate(-60 5 15.75)"/>
          <ellipse cx="19" cy="15.75" rx="2.5" ry="1.8" transform="rotate(60 19 15.75)"/>
        </g>
        <circle class="ghost" cx="12" cy="12" r="2.4"/>
        <circle class="dot"   cx="12" cy="12" r="2.4"/>
        <circle class="veil"  cx="12" cy="12" r="2.4"/>
        <circle class="spark" cx="12" cy="12" r="0.8" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">settings</div>
  </div>

  <!-- LEDGER -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="6.5" x2="12" y2="19" stroke-width="1.7"/>
        <path class="ghost" d="M 4 6 Q 8 6, 12 7 Q 16 6, 20 6 L 20 19 Q 16 18, 12 19 Q 8 18, 4 19 Z"/>
        <path class="dot"   d="M 4 6 Q 8 6, 12 7 Q 16 6, 20 6 L 20 19 Q 16 18, 12 19 Q 8 18, 4 19 Z"/>
        <path class="veil"  d="M 4 6 Q 8 6, 12 7 Q 16 6, 20 6 L 20 19 Q 16 18, 12 19 Q 8 18, 4 19 Z"/>
        <circle class="spark" cx="12" cy="7" r="0.7" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">ledger</div>
  </div>

  <!-- PANEL -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="5" width="16" height="14" rx="1.5" stroke-width="1.7"/>
        <line class="ghost" x1="4" y1="9.5" x2="20" y2="9.5"/>
        <line class="dot"   x1="4" y1="9.5" x2="20" y2="9.5"/>
        <line class="veil"  x1="4" y1="9.5" x2="20" y2="9.5"/>
        <circle class="spark" cx="22" cy="3" r="0.5" fill="currentColor"/>
        <circle class="spark s2" cx="2" cy="22" r="0.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">panel</div>
  </div>

  <!-- LETTER -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 21 11.5 C 21 16, 17 19.5, 12 19.5 C 10 19.5, 8.5 19.2, 7 18.5" stroke-width="1.7"/>
        <path class="ghost" d="M 7 18.5 L 4 21 L 5 17 Q 3 14.5, 3 11.5 C 3 7, 7 3.5, 12 3.5 C 17 3.5, 21 7, 21 11.5"/>
        <path class="dot"   d="M 7 18.5 L 4 21 L 5 17 Q 3 14.5, 3 11.5 C 3 7, 7 3.5, 12 3.5 C 17 3.5, 21 7, 21 11.5"/>
        <path class="veil"  d="M 7 18.5 L 4 21 L 5 17 Q 3 14.5, 3 11.5 C 3 7, 7 3.5, 12 3.5 C 17 3.5, 21 7, 21 11.5"/>
        <circle class="spark" cx="12" cy="11.5" r="0.8" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">letter</div>
  </div>

  <!-- HELD (clock) -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8" stroke-width="1.7"/>
        <line class="ghost" x1="12" y1="12" x2="12" y2="7.5"/>
        <line class="dot"   x1="12" y1="12" x2="12" y2="7.5"/>
        <line class="veil"  x1="12" y1="12" x2="12" y2="7.5"/>
        <line class="ghost" x1="12" y1="12" x2="15.8" y2="13.5"/>
        <line class="dot"   x1="12" y1="12" x2="15.8" y2="13.5"/>
        <line class="veil"  x1="12" y1="12" x2="15.8" y2="13.5"/>
        <circle class="spark" cx="12" cy="12" r="0.9" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">held</div>
  </div>

  <!-- STACK -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 4 7 Q 12 4, 20 7" stroke-width="1.7"/>
        <path class="ghost" d="M 4 12 Q 12 9, 20 12"/>
        <path class="dot"   d="M 4 12 Q 12 9, 20 12"/>
        <path class="veil"  d="M 4 12 Q 12 9, 20 12"/>
        <path class="ghost" d="M 4 17 Q 12 14, 20 17"/>
        <path class="dot slow"  d="M 4 17 Q 12 14, 20 17"/>
        <path class="veil thin" d="M 4 17 Q 12 14, 20 17"/>
        <circle class="spark" cx="20" cy="7" r="0.7" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">stack</div>
  </div>

  <!-- SIFT -->
  <div class="cell">
    <div class="ic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 3 6 Q 12 5, 21 6" stroke-width="1.7"/>
        <path class="ghost" d="M 6 12 Q 12 11, 18 12"/>
        <path class="dot"   d="M 6 12 Q 12 11, 18 12"/>
        <path class="veil"  d="M 6 12 Q 12 11, 18 12"/>
        <path class="ghost" d="M 9 18 Q 12 17.5, 15 18"/>
        <path class="dot slow"  d="M 9 18 Q 12 17.5, 15 18"/>
        <path class="veil thin" d="M 9 18 Q 12 17.5, 15 18"/>
        <circle class="spark" cx="12" cy="18" r="0.7" fill="currentColor"/>
      </svg>
    </div>
    <div class="name">sift</div>
  </div>

</body></html>
