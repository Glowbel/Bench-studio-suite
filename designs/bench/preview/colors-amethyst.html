<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); border: 1px solid var(--border); position: relative; }
  .glow { position: absolute; inset: 0; border-radius: inherit; box-shadow: inset 0 0 22px rgba(176,131,216,0.20); pointer-events: none; }
</style></head>
<body>
  <div class="scale">
    <div><div class="sw" style="background: var(--violet-100)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">violet-100</span><span class="swatch-hex">#E6D2F5</span></div></div>
    <div><div class="sw" style="background: var(--violet-200)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">violet-200</span><span class="swatch-hex">#C9A9EB</span></div></div>
    <div><div class="sw" style="background: var(--violet-300)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">violet-300</span><span class="swatch-hex">#B083D8</span></div></div>
    <div><div class="sw" style="background: var(--violet-500)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">violet-500</span><span class="swatch-hex">#7C44B8</span></div></div>
    <div><div class="sw" style="background: var(--violet-700)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">violet-700</span><span class="swatch-hex">#4D2580</span></div></div>
    <div><div class="sw" style="background: var(--violet-900)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">violet-900</span><span class="swatch-hex">#260F44</span></div></div>
  </div>
</body></html>
