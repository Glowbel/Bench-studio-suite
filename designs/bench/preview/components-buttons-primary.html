<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); width: 78px; }

  .btn {
    font-family: var(--font-body); font-weight: 500; font-size: 14px;
    padding: 10px 20px; border-radius: 8px; border: 1px solid transparent;
    cursor: pointer; transition: all 240ms cubic-bezier(0.25,0.8,0.25,1);
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--teal-700); color: var(--mist-100);
    border-color: rgba(95,213,193,0.30);
    box-shadow: inset 0 0 18px rgba(95,213,193,0.18), 0 1px 2px rgba(0,0,0,0.4);
  }
  .btn-primary.hover {
    background: var(--teal-500);
    box-shadow: inset 0 0 26px rgba(95,213,193,0.35), 0 0 24px rgba(95,213,193,0.18);
  }
  .btn-primary.press { transform: scale(0.98); }

  .btn-ceremony {
    background: linear-gradient(180deg, #2a1d10, #1a1208);
    color: var(--gold-300);
    border-color: rgba(217,180,101,0.40);
    box-shadow: inset 0 0 22px rgba(217,180,101,0.18), 0 1px 2px rgba(0,0,0,0.4);
  }
  .btn-ceremony.hover {
    box-shadow: inset 0 0 30px rgba(217,180,101,0.32), 0 0 26px rgba(217,180,101,0.18);
  }
</style></head>
<body>
  <div class="row"><span class="lbl">primary</span>
    <button class="btn btn-primary">Begin a piece</button>
    <button class="btn btn-primary hover">Begin a piece</button>
    <button class="btn btn-primary press">Begin a piece</button>
    <span class="text-xs" style="color: var(--fg-faint)">rest · hover · pressed</span>
  </div>
  <div class="row"><span class="lbl">ceremony</span>
    <button class="btn btn-ceremony">Mark finished</button>
    <button class="btn btn-ceremony hover">Mark finished</button>
    <span class="text-xs" style="color: var(--fg-faint)">rare — finished work, confirmations</span>
  </div>
</body></html>
