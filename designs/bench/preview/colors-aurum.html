<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; align-items: end; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); border: 1px solid var(--border); position: relative; }
  .glow { position: absolute; inset: 0; border-radius: inherit; box-shadow: inset 0 0 22px rgba(217,180,101,0.22); pointer-events: none; }
  .note { grid-column: span 2; align-self: center;
          font-family: var(--font-display); font-style: italic; font-size: 13px; color: var(--fg-subtle);
          line-height: 1.45; padding-left: 8px; }
</style></head>
<body>
  <div class="scale">
    <div><div class="sw" style="background: var(--gold-300)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">gold-300</span><span class="swatch-hex">#F0D28A</span></div></div>
    <div><div class="sw" style="background: var(--gold-400)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">gold-400 · accent</span><span class="swatch-hex">#D9B465</span></div></div>
    <div><div class="sw" style="background: var(--gold-600)"><div class="glow"></div></div>
      <div class="swatch-label"><span class="swatch-name">gold-600</span><span class="swatch-hex">#9A7C3D</span></div></div>
    <div class="note">Used sparingly. Ceremony moments only —<br/>a finished piece, a confirmed price.</div>
  </div>
</body></html>
