<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body {
    padding: 20px;
    display: flex; align-items: center; justify-content: center;
    min-height: 320px;
  }
  .stage {
    width: 320px; height: 320px;
    color: var(--teal-300);
    animation: ornament-breath 5.5s ease-in-out infinite;
  }
  .stage svg { width: 100%; height: 100%; }

  @keyframes ornament-breath {
    0%, 100% {
      filter:
        drop-shadow(0 0 3px rgba(95, 213, 193, 0.70))
        drop-shadow(0 0 10px rgba(95, 213, 193, 0.28))
        drop-shadow(0 0 22px rgba(95, 213, 193, 0.14));
    }
    50% {
      filter:
        drop-shadow(0 0 5px rgba(95, 213, 193, 1.0))
        drop-shadow(0 0 18px rgba(95, 213, 193, 0.55))
        drop-shadow(0 0 36px rgba(95, 213, 193, 0.32));
    }
  }
</style></head>
<body>
  <div class="stage">
    <svg viewBox="0 0 220 220" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
         xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(110 110)">

        <!-- ============================================================
             OUTER BORDER (kept from previous seal):
             triple concentric rules + three heraldic diamond markers
             ============================================================ -->
        <circle r="100" stroke-width="1.4" opacity="0.85"/>
        <circle r="95"  stroke-width="0.9" opacity="0.50"/>
        <circle r="90"  stroke-width="0.6" opacity="0.25"/>

        <g fill="currentColor" stroke="none">
          <g transform="rotate(-30)"><path d="M 0 -100 L -4 -94 L 0 -88 L 4 -94 Z"/></g>
          <g transform="rotate(90)"> <path d="M 0 -100 L -4 -94 L 0 -88 L 4 -94 Z"/></g>
          <g transform="rotate(210)"><path d="M 0 -100 L -4 -94 L 0 -88 L 4 -94 Z"/></g>
        </g>

        <!-- ============================================================
             TRISKELE SCROLLS — three comma-shaped scrolls at 120°.
             Each arm: a flowing outer sweep + an inner accent curl,
             paired bud-tips, all turning clockwise.
             ============================================================ -->

        <!-- Arm 1: top -->
        <g transform="rotate(-90)">
          <!-- Outer scroll curve — wide sweep -->
          <path d="M 0 -8
                   C 18 -10, 36 -22, 38 -44
                   C 40 -64, 22 -76, 6 -68
                   C -10 -60, -10 -42, 0 -38"
                stroke-width="2.0"/>
          <!-- Inner accent curve — parallel ribbon inside -->
          <path d="M 0 -16
                   C 14 -18, 28 -26, 30 -42
                   C 32 -56, 18 -64, 8 -58
                   C -2 -52, -2 -42, 4 -42"
                stroke-width="1.1"
                opacity="0.75"/>
          <!-- Angular movement pips along the flow -->
          <g fill="currentColor" stroke="none">
            <path d="M 22 -28 L 24 -26 L 22 -24 L 20 -26 Z"/>
            <path d="M 32 -56 L 34 -54 L 32 -52 L 30 -54 Z"/>
            <path d="M 16 -44 L 18 -42 L 16 -40 L 14 -42 Z" opacity="0.8"/>
          </g>
          <!-- Angular root-chevron where the scroll meets the center -->
          <path d="M -3 -14 L 0 -10 L 3 -14" stroke-width="1.1"/>
          <!-- Bud tips -->
          <circle cx="0" cy="-38" r="2"   fill="currentColor" stroke="none"/>
          <circle cx="4" cy="-42" r="1.4" fill="currentColor" stroke="none" opacity="0.85"/>
          <!-- Trailing flourish dot in the open part of the comma -->
          <circle cx="22" cy="-50" r="1.2" fill="currentColor" stroke="none" opacity="0.7"/>
        </g>

        <!-- Arm 2: lower-right (rotated 30°) -->
        <g transform="rotate(30)">
          <path d="M 0 -8
                   C 18 -10, 36 -22, 38 -44
                   C 40 -64, 22 -76, 6 -68
                   C -10 -60, -10 -42, 0 -38"
                stroke-width="2.0"/>
          <path d="M 0 -16
                   C 14 -18, 28 -26, 30 -42
                   C 32 -56, 18 -64, 8 -58
                   C -2 -52, -2 -42, 4 -42"
                stroke-width="1.1"
                opacity="0.75"/>
          <g fill="currentColor" stroke="none">
            <path d="M 22 -28 L 24 -26 L 22 -24 L 20 -26 Z"/>
            <path d="M 32 -56 L 34 -54 L 32 -52 L 30 -54 Z"/>
            <path d="M 16 -44 L 18 -42 L 16 -40 L 14 -42 Z" opacity="0.8"/>
          </g>
          <path d="M -3 -14 L 0 -10 L 3 -14" stroke-width="1.1"/>
          <circle cx="0" cy="-38" r="2"   fill="currentColor" stroke="none"/>
          <circle cx="4" cy="-42" r="1.4" fill="currentColor" stroke="none" opacity="0.85"/>
          <circle cx="22" cy="-50" r="1.2" fill="currentColor" stroke="none" opacity="0.7"/>
        </g>

        <!-- Arm 3: lower-left (rotated 150°) -->
        <g transform="rotate(150)">
          <path d="M 0 -8
                   C 18 -10, 36 -22, 38 -44
                   C 40 -64, 22 -76, 6 -68
                   C -10 -60, -10 -42, 0 -38"
                stroke-width="2.0"/>
          <path d="M 0 -16
                   C 14 -18, 28 -26, 30 -42
                   C 32 -56, 18 -64, 8 -58
                   C -2 -52, -2 -42, 4 -42"
                stroke-width="1.1"
                opacity="0.75"/>
          <g fill="currentColor" stroke="none">
            <path d="M 22 -28 L 24 -26 L 22 -24 L 20 -26 Z"/>
            <path d="M 32 -56 L 34 -54 L 32 -52 L 30 -54 Z"/>
            <path d="M 16 -44 L 18 -42 L 16 -40 L 14 -42 Z" opacity="0.8"/>
          </g>
          <path d="M -3 -14 L 0 -10 L 3 -14" stroke-width="1.1"/>
          <circle cx="0" cy="-38" r="2"   fill="currentColor" stroke="none"/>
          <circle cx="4" cy="-42" r="1.4" fill="currentColor" stroke="none" opacity="0.85"/>
          <circle cx="22" cy="-50" r="1.2" fill="currentColor" stroke="none" opacity="0.7"/>
        </g>

        <!-- ============================================================
             CENTRAL UNITY ORB — where the three scrolls meet
             ============================================================ -->
        <circle r="6" stroke-width="1.3"/>
        <circle r="2.4" fill="currentColor" stroke="none"/>
        <circle r="12" stroke-width="0.5" opacity="0.45"/>

      </g>
    </svg>
  </div>
</body></html>
