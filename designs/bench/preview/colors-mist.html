<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); border: 1px solid var(--border); }
</style></head>
<body>
  <div class="scale">
    <div><div class="sw" style="background: var(--mist-100)"></div>
      <div class="swatch-label"><span class="swatch-name">mist-100 · emphasis</span><span class="swatch-hex">#F3F6F5</span></div></div>
    <div><div class="sw" style="background: var(--mist-200)"></div>
      <div class="swatch-label"><span class="swatch-name">mist-200 · text</span><span class="swatch-hex">#D8DFDC</span></div></div>
    <div><div class="sw" style="background: var(--mist-300)"></div>
      <div class="swatch-label"><span class="swatch-name">mist-300 · body</span><span class="swatch-hex">#B3BDBA</span></div></div>
    <div><div class="sw" style="background: var(--mist-400)"></div>
      <div class="swatch-label"><span class="swatch-name">mist-400 · helper</span><span class="swatch-hex">#8A9692</span></div></div>
    <div><div class="sw" style="background: var(--mist-500)"></div>
      <div class="swatch-label"><span class="swatch-name">mist-500 · muted</span><span class="swatch-hex">#5E6A66</span></div></div>
  </div>
</body></html>
