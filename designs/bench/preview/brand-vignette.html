<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .scene {
    width: 100%; height: 320px;
    background:
      radial-gradient(ellipse 60% 50% at 70% 30%, rgba(95, 213, 193, 0.10), transparent 60%),
      radial-gradient(ellipse 50% 45% at 15% 80%, rgba(124, 68, 184, 0.12), transparent 60%),
      var(--ink-950);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .orb {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: breathe 2.4s ease-in-out infinite;
    filter: blur(1px);
  }
  .orb.a { width: 260px; height: 260px; top: -60px; right: -40px; background: var(--orb-teal); }
  .orb.b { width: 220px; height: 220px; bottom: -60px; left: -40px; background: var(--orb-violet); animation-delay: 1.2s; }
  .orb.c { width: 120px; height: 120px; top: 40%; left: 30%; background: var(--orb-gold); opacity: .6; animation-delay: 0.6s; }
  @keyframes breathe { 0%,100%{opacity:.55} 50%{opacity:1} }

  .label {
    position: relative; z-index: 1;
    font-family: var(--font-display); font-style: italic; font-size: 22px;
    color: var(--mist-200); text-shadow: 0 0 30px rgba(0,0,0,0.6);
    text-wrap: pretty; max-width: 360px; text-align: center;
    letter-spacing: 0.01em;
  }
  .meta {
    position: absolute; bottom: 14px; left: 16px;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-faint); letter-spacing: 0.04em;
  }
</style></head>
<body>
  <div class="scene">
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="orb c"></div>
    <div class="label">The stirrings of something alive.</div>
    <div class="meta">page background — vignette + breathing orbs</div>
  </div>
</body></html>
