<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body {
    padding: 28px;
    display: flex; align-items: center; justify-content: center;
    min-height: 180px;
  }
  .wordmark { width: 400px; height: auto; display: block; }

  /* Symbol — teal, breathing glow */
  .wm-glyph {
    color: var(--teal-300);
    animation: glyph-breath 5.5s ease-in-out infinite;
  }
  .wm-glyph .mote { animation: mote-drift 4s ease-in-out infinite; }
  .wm-glyph .m1 { animation-delay: 0s; }
  .wm-glyph .m2 { animation-delay: 1.3s; }
  .wm-glyph .m3 { animation-delay: 2.6s; }

  /* Wordtext — golden, breathing */
  .wm-name {
    font-family: "Cormorant Garamond", "EB Garamond", Georgia, serif;
    font-weight: 500; font-size: 44px; letter-spacing: 0.04em;
    fill: url(#goldGrad);
    animation: wm-breath 5s ease-in-out infinite;
  }
  .wm-tag {
    font-family: "Cormorant Garamond", "EB Garamond", Georgia, serif;
    font-style: italic; font-weight: 400; font-size: 14px;
    letter-spacing: 0.20em;
    fill: var(--gold-600); opacity: 0.85;
  }

  @keyframes wm-breath {
    0%, 100% {
      filter: drop-shadow(0 0 6px rgba(217,180,101,0.45))
              drop-shadow(0 0 16px rgba(217,180,101,0.22));
    }
    50% {
      filter: drop-shadow(0 0 10px rgba(217,180,101,0.75))
              drop-shadow(0 0 28px rgba(217,180,101,0.45));
    }
  }
  @keyframes glyph-breath {
    0%, 100% {
      filter: drop-shadow(0 0 4px rgba(95, 213, 193, 0.55))
              drop-shadow(0 0 12px rgba(95, 213, 193, 0.25));
    }
    50% {
      filter: drop-shadow(0 0 8px rgba(95, 213, 193, 0.95))
              drop-shadow(0 0 22px rgba(95, 213, 193, 0.50));
    }
  }
  @keyframes mote-drift {
    0%, 100% { opacity: 0.3; transform: translate(0, 0); }
    50%      { opacity: 1;   transform: translate(0, -2px); }
  }
</style></head>
<body>

  <svg class="wordmark" viewBox="0 0 480 110" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#fce6a8"/>
        <stop offset="55%" stop-color="#e5c177"/>
        <stop offset="100%" stop-color="#b08f4d"/>
      </linearGradient>
    </defs>

    <!-- ============================================================
         Glyph: three node-line tendrils unfurling into fiddleheads.
         A seed-core; each arm = vertical stem + right-angle node +
         circuit-trace run + spiral curl resolving into a leaf bud.
         Threefold rotational symmetry.
         ============================================================ -->
    <g class="wm-glyph" transform="translate(52 52)"
       fill="none" stroke="currentColor"
       stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">

      <!-- Outer containment, very faint -->
      <circle r="38" stroke-width="0.5" opacity="0.22"/>

      <!-- Central seed: thin ring + filled core -->
      <circle r="4.5" stroke-width="0.9" opacity="0.7"/>
      <circle r="1.8" fill="currentColor" stroke="none"/>

      <!-- Tendril unit (defined once, rotated three times) -->
      <g>
        <!-- Stem (going up in local frame) + right-angle node -->
        <path d="M 0 -8 L 0 -16 L 13 -16"/>
        <circle cx="0"  cy="-16" r="1.6" fill="currentColor" stroke="none"/>
        <circle cx="13" cy="-16" r="1.6" fill="currentColor" stroke="none"/>
        <!-- Spiral curl into leaf bud -->
        <path d="M 13 -16
                 C 22 -16, 26 -24, 22 -30
                 C 18 -36, 9  -34, 9 -28
                 C 9  -22, 16 -22, 14 -25"/>
        <circle cx="14" cy="-25" r="1.6" fill="currentColor" stroke="none"/>
      </g>

      <g transform="rotate(120)">
        <path d="M 0 -8 L 0 -16 L 13 -16"/>
        <circle cx="0"  cy="-16" r="1.6" fill="currentColor" stroke="none"/>
        <circle cx="13" cy="-16" r="1.6" fill="currentColor" stroke="none"/>
        <path d="M 13 -16
                 C 22 -16, 26 -24, 22 -30
                 C 18 -36, 9  -34, 9 -28
                 C 9  -22, 16 -22, 14 -25"/>
        <circle cx="14" cy="-25" r="1.6" fill="currentColor" stroke="none"/>
      </g>

      <g transform="rotate(240)">
        <path d="M 0 -8 L 0 -16 L 13 -16"/>
        <circle cx="0"  cy="-16" r="1.6" fill="currentColor" stroke="none"/>
        <circle cx="13" cy="-16" r="1.6" fill="currentColor" stroke="none"/>
        <path d="M 13 -16
                 C 22 -16, 26 -24, 22 -30
                 C 18 -36, 9  -34, 9 -28
                 C 9  -22, 16 -22, 14 -25"/>
        <circle cx="14" cy="-25" r="1.6" fill="currentColor" stroke="none"/>
      </g>

      <!-- Floating motes in the gaps — the 'air' quality -->
      <circle class="mote m1" cx="0"   cy="32"  r="0.9" fill="currentColor" stroke="none"/>
      <circle class="mote m2" cx="-28" cy="-16" r="0.9" fill="currentColor" stroke="none"/>
      <circle class="mote m3" cx="28"  cy="-16" r="0.9" fill="currentColor" stroke="none"/>

    </g>

    <!-- Wordmark text — golden, breathing -->
    <text x="108" y="62" class="wm-name">filigree</text>
    <text x="110" y="82" class="wm-tag">THE ATELIER LEDGER</text>

  </svg>

</body></html>
