<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bench Terminal</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: #0a0a0b;
  color: #c0c0c0;
  font-family: "Courier New", Courier, monospace;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── views ── */
.view { display: none; flex: 1; overflow: hidden; min-height: 0; }
.view.active { display: flex; }

/* ── auth ── */
#view-auth {
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#auth-box {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 300px;
}
#auth-box h1 {
  font-size: 12px;
  color: #444;
  letter-spacing: 0.15em;
  text-align: center;
  margin-bottom: 6px;
}
#auth-input {
  background: #111;
  border: 1px solid #2a2a2a;
  color: #c0c0c0;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  width: 100%;
}
#auth-input:focus { border-color: #444; }
#auth-submit {
  background: #111;
  border: 1px solid #2a2a2a;
  color: #888;
  font-family: inherit;
  font-size: 12px;
  padding: 7px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
#auth-submit:hover { background: #181818; border-color: #444; color: #c0c0c0; }
#auth-error { color: #9b3535; font-size: 11px; text-align: center; min-height: 14px; }

/* ── editor ── */
#view-editor { flex-direction: row; }

#sidebar {
  width: 280px;
  min-width: 280px;
  border-right: 1px solid #181818;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 7px 10px;
  font-size: 10px;
  color: #3a3a3a;
  border-bottom: 1px solid #181818;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  flex-shrink: 0;
}
#file-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
#file-list::-webkit-scrollbar { width: 4px; }
#file-list::-webkit-scrollbar-track { background: transparent; }
#file-list::-webkit-scrollbar-thumb { background: #222; }
.file-item {
  padding: 4px 10px 4px 12px;
  cursor: pointer;
  color: #555;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid transparent;
  line-height: 1.8;
}
.file-item:hover { color: #999; background: #0d0d0e; }
.file-item.active { color: #c8c8c8; border-left-color: #444; background: #0f0f11; }

#editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
#editor-path-bar {
  padding: 5px 14px;
  font-size: 11px;
  color: #3a3a3a;
  border-bottom: 1px solid #181818;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}
#editor-textarea {
  flex: 1;
  background: #0a0a0b;
  color: #c8c8c8;
  border: none;
  resize: none;
  outline: none;
  font-family: "Courier New", Courier, monospace;
  font-size: 13px;
  line-height: 1.55;
  padding: 14px 16px;
  tab-size: 2;
  -moz-tab-size: 2;
  min-height: 0;
}

/* ── diff ── */
#view-diff { flex-direction: column; }

#diff-header {
  padding: 7px 14px;
  border-bottom: 1px solid #181818;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#diff-title {
  font-size: 10px;
  color: #3a3a3a;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  flex: 1;
}
#diff-back, #diff-commit-btn {
  background: #111;
  border: 1px solid #2a2a2a;
  color: #777;
  font-family: inherit;
  font-size: 11px;
  padding: 4px 12px;
  cursor: pointer;
}
#diff-back:hover { background: #181818; border-color: #444; color: #c0c0c0; }
#diff-commit-btn { border-color: #1e3a1e; color: #5a9a5a; }
#diff-commit-btn:hover:not(:disabled) { background: #111a11; border-color: #3a6a3a; color: #7acc7a; }
#diff-commit-btn:disabled { opacity: 0.35; cursor: default; }

#diff-msg-row {
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #181818;
  flex-shrink: 0;
}
#diff-msg-label { color: #3a3a3a; font-size: 11px; white-space: nowrap; }
#diff-message {
  flex: 1;
  background: #0e0e0f;
  border: 1px solid #222;
  color: #c0c0c0;
  font-family: inherit;
  font-size: 12px;
  padding: 4px 8px;
  outline: none;
}
#diff-message:focus { border-color: #444; }

#diff-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.55;
}
#diff-content::-webkit-scrollbar { width: 4px; height: 4px; }
#diff-content::-webkit-scrollbar-thumb { background: #222; }

.diff-line {
  display: flex;
  padding: 0 14px;
  min-width: max-content;
}
.diff-line-num {
  color: #282828;
  min-width: 44px;
  user-select: none;
  font-size: 11px;
  padding-top: 1px;
}
.diff-line-prefix {
  min-width: 16px;
  user-select: none;
}
.diff-line-text {
  flex: 1;
  white-space: pre;
}
.diff-line.same .diff-line-text   { color: #404040; }
.diff-line.same .diff-line-prefix { color: #282828; }
.diff-line.removed { background: rgba(160, 30, 30, 0.12); }
.diff-line.removed .diff-line-prefix { color: #9b3535; }
.diff-line.removed .diff-line-text   { color: #c07070; }
.diff-line.added   { background: rgba(30, 120, 30, 0.12); }
.diff-line.added .diff-line-prefix { color: #3a9a3a; }
.diff-line.added .diff-line-text   { color: #70b870; }

/* ── status bar ── */
#status-bar {
  height: 26px;
  flex-shrink: 0;
  background: #0d0d0e;
  border-top: 1px solid #181818;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  font-size: 11px;
}
#status-path  { color: #444; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#status-dirty { color: #666; white-space: nowrap; flex-shrink: 0; }
#status-text  { white-space: nowrap; flex-shrink: 0; }
#status-text.working { color: #555; }
#status-text.success { color: #3a9a3a; }
#status-text.error   { color: #9b3535; }

#status-reload-btn {
  display: none;
  background: none;
  border: 1px solid #4a2020;
  color: #9b5555;
  font-family: inherit;
  font-size: 11px;
  padding: 1px 8px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
#status-reload-btn:hover { border-color: #7a3535; color: #c07070; }

#status-commit-btn {
  display: none;
  background: none;
  border: 1px solid #2a2a2a;
  color: #555;
  font-family: inherit;
  font-size: 11px;
  padding: 1px 10px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
#status-commit-btn:hover:not(:disabled) { border-color: #444; color: #c0c0c0; }
#status-commit-btn:disabled { opacity: 0.3; cursor: default; }

/* ── spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 9px;
  height: 9px;
  border: 1px solid #333;
  border-top-color: #666;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 4px;
}
</style>
</head>
<body>

<!-- Auth -->
<div id="view-auth" class="view">
  <div id="auth-box">
    <h1>BENCH TERMINAL</h1>
    <input id="auth-input" type="password" placeholder="password" autocomplete="off" />
    <button id="auth-submit">connect</button>
    <div id="auth-error"></div>
  </div>
</div>

<!-- Editor -->
<div id="view-editor" class="view">
  <div id="sidebar">
    <div id="sidebar-header">files</div>
    <div id="file-list"></div>
  </div>
  <div id="editor-pane">
    <div id="editor-path-bar">—</div>
    <textarea id="editor-textarea" spellcheck="false"
      autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
  </div>
</div>

<!-- Diff -->
<div id="view-diff" class="view">
  <div id="diff-header">
    <span id="diff-title">review changes</span>
    <button id="diff-back">back to editor</button>
    <button id="diff-commit-btn">confirm commit</button>
  </div>
  <div id="diff-msg-row">
    <span id="diff-msg-label">message:</span>
    <input id="diff-message" type="text" autocomplete="off" />
  </div>
  <div id="diff-content"></div>
</div>

<!-- Status bar -->
<div id="status-bar">
  <span id="status-path"></span>
  <span id="status-dirty"></span>
  <span id="status-text"></span>
  <button id="status-reload-btn">reload file</button>
  <button id="status-commit-btn" disabled>review &amp; commit</button>
</div>

<script>
/* ── constants ─────────────────────────────────────────────────────────── */
var WORKER_URL = "WORKER_URL_HERE";

/* ── state ─────────────────────────────────────────────────────────────── */
var state = {
  workerUrl:     WORKER_URL,
  password:      "",
  authenticated: false,
  fileTree:      [],
  activeFile: {
    path:            "",
    content:         "",
    originalContent: "",
    sha:             "",
    dirty:           false
  },
  view:   "auth",
  status: { type: "idle", text: "", shaConflict: false }
};

/* ── view management ───────────────────────────────────────────────────── */
function showView(name) {
  var views = document.querySelectorAll(".view");
  for (var i = 0; i < views.length; i++) {
    views[i].classList.remove("active");
  }
  document.getElementById("view-" + name).classList.add("active");
  state.view = name;
  updateStatusBar();
}

/* ── status bar ────────────────────────────────────────────────────────── */
var statusClearTimer = null;

function setStatus(type, text, shaConflict) {
  if (statusClearTimer) {
    clearTimeout(statusClearTimer);
    statusClearTimer = null;
  }
  state.status.type        = type;
  state.status.text        = text;
  state.status.shaConflict = shaConflict || false;
  if (type === "success") {
    statusClearTimer = setTimeout(function() {
      state.status.type        = "idle";
      state.status.text        = "";
      state.status.shaConflict = false;
      updateStatusBar();
    }, 3000);
  }
  updateStatusBar();
}

function updateStatusBar() {
  var pathEl     = document.getElementById("status-path");
  var dirtyEl    = document.getElementById("status-dirty");
  var textEl     = document.getElementById("status-text");
  var commitBtn  = document.getElementById("status-commit-btn");
  var reloadBtn  = document.getElementById("status-reload-btn");

  if (state.view === "editor" && state.activeFile.path) {
    pathEl.textContent  = state.activeFile.path;
    dirtyEl.textContent = state.activeFile.dirty ? "unsaved" : "";
  } else {
    pathEl.textContent  = "";
    dirtyEl.textContent = "";
  }

  if (state.view === "editor") {
    commitBtn.style.display = "";
    commitBtn.disabled = !state.activeFile.dirty;
  } else {
    commitBtn.style.display = "none";
  }

  textEl.className = state.status.type;
  if (state.status.type === "working") {
    textEl.innerHTML = '<span class="spinner"></span>' + state.status.text;
  } else {
    textEl.textContent = state.status.text;
  }

  reloadBtn.style.display = state.status.shaConflict ? "" : "none";
}

/* ── api ───────────────────────────────────────────────────────────────── */
function apiGet(endpoint, onSuccess, onError) {
  fetch(state.workerUrl + endpoint, {
    headers: { "Authorization": "Bearer " + state.password }
  }).then(function(res) {
    var status = res.status;
    return res.json().then(function(data) {
      if (status === 200) { onSuccess(data); } else { onError(data); }
    });
  }).catch(function() {
    onError({ error: "network", status: 0 });
  });
}

function apiPut(body, onSuccess, onError) {
  fetch(state.workerUrl + "/file", {
    method: "PUT",
    headers: {
      "Authorization": "Bearer " + state.password,
      "Content-Type":  "application/json"
    },
    body: JSON.stringify(body)
  }).then(function(res) {
    var status = res.status;
    return res.json().then(function(data) {
      if (status === 200) { onSuccess(data); } else { onError(data); }
    });
  }).catch(function() {
    onError({ error: "network", status: 0 });
  });
}

/* ── auth ──────────────────────────────────────────────────────────────── */
function handleAuth() {
  var input   = document.getElementById("auth-input");
  var errorEl = document.getElementById("auth-error");
  var pw = input.value;
  if (!pw) return;
  errorEl.textContent = "";
  setStatus("working", "Connecting...");
  state.password = pw;

  apiGet("/tree", function(data) {
    state.authenticated = true;
    state.fileTree = data;
    state.fileTree.sort(function(a, b) {
      return a.path < b.path ? -1 : a.path > b.path ? 1 : 0;
    });
    renderFileTree();
    setStatus("idle", "");
    showView("editor");
  }, function(err) {
    state.password = "";
    errorEl.textContent = (err.error === "auth") ? "wrong password" : "connection failed";
    setStatus("idle", "");
  });
}

/* ── file tree ─────────────────────────────────────────────────────────── */
function renderFileTree() {
  var list = document.getElementById("file-list");
  list.innerHTML = "";
  for (var i = 0; i < state.fileTree.length; i++) {
    var file = state.fileTree[i];
    var item = document.createElement("div");
    item.className      = "file-item";
    item.textContent    = file.path;
    item.dataset.path   = file.path;
    item.dataset.sha    = file.sha;
    item.addEventListener("click", onFileItemClick);
    list.appendChild(item);
  }
}

function onFileItemClick() {
  var path = this.dataset.path;
  if (state.activeFile.dirty) {
    if (!confirm("Discard unsaved changes to " + state.activeFile.path + "?")) return;
  }
  loadFile(path);
}

/* ── file load ─────────────────────────────────────────────────────────── */
function loadFile(path) {
  setStatus("working", "Loading...");
  apiGet("/file?path=" + encodeURIComponent(path), function(data) {
    state.activeFile.path            = path;
    state.activeFile.content         = data.content;
    state.activeFile.originalContent = data.content;
    state.activeFile.sha             = data.sha;
    state.activeFile.dirty           = false;

    document.getElementById("editor-textarea").value  = data.content;
    document.getElementById("editor-path-bar").textContent = path;

    var items = document.querySelectorAll(".file-item");
    for (var i = 0; i < items.length; i++) {
      items[i].classList.remove("active");
      if (items[i].dataset.path === path) items[i].classList.add("active");
    }

    setStatus("idle", "");
    updateStatusBar();
  }, function(err) {
    if (err.error === "not_found") {
      setStatus("error", "File not found.");
    } else {
      setStatus("error", "Load failed.");
    }
  });
}

/* ── textarea ──────────────────────────────────────────────────────────── */
function setupTextarea() {
  var ta = document.getElementById("editor-textarea");

  ta.addEventListener("input", function() {
    state.activeFile.content = ta.value;
    var prev  = state.activeFile.dirty;
    state.activeFile.dirty = (ta.value !== state.activeFile.originalContent);
    if (prev !== state.activeFile.dirty) updateStatusBar();
  });

  ta.addEventListener("keydown", function(e) {
    if (e.key !== "Tab") return;
    e.preventDefault();
    var s   = ta.selectionStart;
    var end = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + "  " + ta.value.substring(end);
    ta.selectionStart = s + 2;
    ta.selectionEnd   = s + 2;
    state.activeFile.content = ta.value;
    state.activeFile.dirty   = (ta.value !== state.activeFile.originalContent);
    updateStatusBar();
  });
}

/* ── diff ──────────────────────────────────────────────────────────────── */
function computeDiff(original, current) {
  var oldLines = original.split("\n");
  var newLines = current.split("\n");
  var result   = [];
  var max = oldLines.length > newLines.length ? oldLines.length : newLines.length;
  for (var i = 0; i < max; i++) {
    var hasOld = (i < oldLines.length);
    var hasNew = (i < newLines.length);
    if (hasOld && hasNew && oldLines[i] === newLines[i]) {
      result.push({ type: "same",    text: oldLines[i], n: i + 1 });
    } else {
      if (hasOld) result.push({ type: "removed", text: oldLines[i], n: i + 1 });
      if (hasNew) result.push({ type: "added",   text: newLines[i], n: i + 1 });
    }
  }
  return result;
}

function countChanged(diff) {
  var n = 0;
  for (var i = 0; i < diff.length; i++) {
    if (diff[i].type !== "same") n++;
  }
  return n;
}

function showDiffView() {
  var diff = computeDiff(state.activeFile.originalContent, state.activeFile.content);
  var changed = countChanged(diff);

  document.getElementById("diff-message").value =
    "edit: " + state.activeFile.path + " (" + changed + " lines)";

  var container = document.getElementById("diff-content");
  container.innerHTML = "";

  for (var i = 0; i < diff.length; i++) {
    var entry = diff[i];

    var row = document.createElement("div");
    row.className = "diff-line " + entry.type;

    var numEl = document.createElement("span");
    numEl.className   = "diff-line-num";
    numEl.textContent = entry.n;

    var prefixEl = document.createElement("span");
    prefixEl.className = "diff-line-prefix";
    if      (entry.type === "removed") prefixEl.textContent = "-";
    else if (entry.type === "added")   prefixEl.textContent = "+";
    else                               prefixEl.textContent = " ";

    var textEl = document.createElement("span");
    textEl.className   = "diff-line-text";
    textEl.textContent = entry.text;

    row.appendChild(numEl);
    row.appendChild(prefixEl);
    row.appendChild(textEl);
    container.appendChild(row);
  }

  showView("diff");
}

/* ── commit ────────────────────────────────────────────────────────────── */
function handleCommit() {
  var message = document.getElementById("diff-message").value.trim();
  if (!message) { setStatus("error", "Commit message required."); return; }

  var btn = document.getElementById("diff-commit-btn");
  btn.disabled = true;
  setStatus("working", "Committing...");

  apiPut({
    path:    state.activeFile.path,
    content: state.activeFile.content,
    sha:     state.activeFile.sha,
    message: message
  }, function(data) {
    state.activeFile.sha             = data.newSha;
    state.activeFile.originalContent = state.activeFile.content;
    state.activeFile.dirty           = false;
    btn.disabled = false;
    setStatus("success", "Committed.");
    showView("editor");
    updateStatusBar();
  }, function(err) {
    btn.disabled = false;
    if (err.error === "sha_conflict") {
      setStatus("error", "File changed remotely — reload before committing.", true);
    } else if (err.error === "rate_limit") {
      setStatus("error", "GitHub rate limit hit. Try again later.");
    } else if (err.error === "validation") {
      setStatus("error", "Commit rejected: " + (err.detail || "validation error"));
    } else {
      setStatus("error", "Commit failed. Try again.");
    }
  });
}

function handleReloadFile() {
  if (!confirm("Reload " + state.activeFile.path + "? Unsaved changes will be lost.")) return;
  state.status.shaConflict = false;
  showView("editor");
  loadFile(state.activeFile.path);
}

/* ── beforeunload ──────────────────────────────────────────────────────── */
window.addEventListener("beforeunload", function(e) {
  if (state.activeFile.dirty) {
    e.preventDefault();
    e.returnValue = "";
  }
});

/* ── init ──────────────────────────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", function() {
  setupTextarea();

  document.getElementById("auth-submit").addEventListener("click", handleAuth);
  document.getElementById("auth-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") handleAuth();
  });

  document.getElementById("status-commit-btn").addEventListener("click", function() {
    if (state.activeFile.dirty) showDiffView();
  });
  document.getElementById("status-reload-btn").addEventListener("click", handleReloadFile);

  document.getElementById("diff-back").addEventListener("click", function() {
    showView("editor");
  });
  document.getElementById("diff-commit-btn").addEventListener("click", handleCommit);

  showView("auth");
  document.getElementById("auth-input").focus();
});
</script>
</body>
</html>
