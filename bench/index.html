<!--
  ════════════════════════════════════════════════════════════════════
  ZONE REGISTRY REBUILDER — read me before editing the registry above
  ════════════════════════════════════════════════════════════════════

  WHEN TO RUN
    Any time zone boundaries shift. Adding/removing lines inside an
    existing zone pushes later zones up or down, so the line numbers in
    the registry above go stale. This script rewrites the registry to
    match reality. Markers themselves are never touched.

  HOW TO RUN (works with any version of Claude)
    1. Copy the Python script below (between the SCRIPT START / SCRIPT
       END fences) into a file, e.g. /tmp/rebuild_registry.py
    2. Run it, passing the HTML file path:
         python3 /tmp/rebuild_registry.py /path/to/this-file.html
    3. The registry block above is rewritten in place with current
       line numbers. Nothing else in the file is modified.
    4. Sanity check: grep for the BEGIN and END marker patterns —
       every BEGIN should pair with a matching END in correct nesting.

  OUTPUT CONTRACT (what the registry must look like)
    - Top-level zones only (sub-zones with a colon in the name, e.g.
      EVENTS:CAROUSEL, are EXCLUDED from the registry — they live
      nested inside their parent and are found by grep, not lookup).
    - One zone per line, formatted:
        NAME (22 chars, left-aligned)  BEGIN_LINE — END_LINE
    - CSS/JS duplicates (e.g. CAPSULE appears in both stylesheet and
      script) get a (CSS) or (JS) suffix based on whether their BEGIN
      line is before or after the closing style tag.
    - Zones sorted by BEGIN line, ascending.

  ADDING NEW ZONES
    The script does not invent zone boundaries — it only reflects what
    is already marked. To add a new zone, manually insert the marker
    pair in the code:
        /* === BEGIN NEW-ZONE-NAME === */
        ...code...
        /* === END NEW-ZONE-NAME === */
    Then run the script. The new zone appears in the registry
    automatically. Removing markers works the same way (delete the
    pair, re-run, registry shrinks).

  ════════════════════════════════════════════════════════════════════
  SCRIPT START — copy from here to SCRIPT END
  ════════════════════════════════════════════════════════════════════
  # rebuild_registry.py
  # Stdlib only. Python 3.6+.
  #
  # Scans an HTML file for /* === BEGIN <NAME> === */ ... /* === END
  # <NAME> === */ marker pairs and rewrites the ZONE REGISTRY comment
  # block at the top of the file with current line numbers.

  import sys

  HTML_COMMENT_OPEN = "<!" + "--"
  HTML_COMMENT_CLOSE = "--" + ">"   # avoid literal sequence in source
  STYLE_CLOSE = "</" + "style>"     # avoid literal in prose comments above

  def rebuild(path):
      with open(path, "r") as f:
          lines = f.read().split("\n")

      # Single pass: find marker pairs AND the closing style tag, while
      # skipping HTML comments (which may contain the registry, the
      # rebuilder source, or prose mentioning the same tokens).
      markers = []
      style_close = None
      in_html_comment = False
      for i, line in enumerate(lines, start=1):
          s = line.strip()
          if not in_html_comment:
              if s.startswith(HTML_COMMENT_OPEN):
                  in_html_comment = True
                  if HTML_COMMENT_CLOSE in s:
                      in_html_comment = False
                  continue
          else:
              if HTML_COMMENT_CLOSE in s:
                  in_html_comment = False
              continue
          if style_close is None and STYLE_CLOSE in line:
              style_close = i
          if s.startswith("/* === BEGIN ") and s.endswith(" === */"):
              name = s[len("/* === BEGIN "):-len(" === */")].strip()
              markers.append(("BEGIN", name, i))
          elif s.startswith("/* === END ") and s.endswith(" === */"):
              name = s[len("/* === END "):-len(" === */")].strip()
              markers.append(("END", name, i))

      # Pair BEGIN with END. Top-level zones only (no colon in name).
      zones, stack = [], {}
      for kind, name, ln in markers:
          if kind == "BEGIN":
              stack[name] = ln
          else:
              if name in stack:
                  b = stack.pop(name)
                  if ":" not in name:
                      zones.append((name, b, ln))
      zones.sort(key=lambda z: z[1])

      # Disambiguate CSS/JS duplicates by closing style tag position.
      counts = {}
      for n, _, _ in zones:
          counts[n] = counts.get(n, 0) + 1
      labeled = []
      for n, b, e in zones:
          if counts[n] > 1:
              suffix = " (CSS)" if (style_close and b < style_close) else " (JS)"
              labeled.append((n + suffix, b, e))
          else:
              labeled.append((n, b, e))

      # Build the new registry block.
      bar = "═" * 68
      reg = [HTML_COMMENT_OPEN]
      reg.append("  " + bar)
      reg.append("  ZONE REGISTRY — bench v5  (added May 2026)")
      reg.append("  " + bar)
      reg.append("  Grep:  /* === BEGIN <NAME> === */  ...  /* === END <NAME> === */")
      reg.append("  Sub-zones inside EVENTS use NAME:CHILD (e.g. EVENTS:CAROUSEL).")
      reg.append("  Line numbers are post-marker. Rebuild script lives below this block.")
      reg.append("")
      for name, b, e in labeled:
          reg.append("    {:<22s} {:>5d} — {:<5d}".format(name, b, e))
      reg.append("  " + bar)
      reg.append(HTML_COMMENT_CLOSE)
      new_block = "\n".join(reg)

      # Replace the existing ZONE REGISTRY comment block in place.
      out, i, replaced = [], 0, False
      while i < len(lines):
          line = lines[i]
          if not replaced and line.strip() == HTML_COMMENT_OPEN:
              peek = "\n".join(lines[i:min(i + 6, len(lines))])
              if "ZONE REGISTRY" in peek:
                  j = i
                  while j < len(lines) and HTML_COMMENT_CLOSE not in lines[j]:
                      j += 1
                  out.extend(new_block.split("\n"))
                  i = j + 1
                  replaced = True
                  continue
          out.append(line)
          i += 1

      if not replaced:
          raise SystemExit("Existing ZONE REGISTRY block not found.")

      with open(path, "w") as f:
          f.write("\n".join(out))

      print("Rebuilt registry: {} top-level zones".format(len(labeled)))

  if __name__ == "__main__":
      if len(sys.argv) != 2:
          sys.exit("Usage: python3 rebuild_registry.py <path-to-html>")
      rebuild(sys.argv[1])
  ════════════════════════════════════════════════════════════════════
  SCRIPT END
  ════════════════════════════════════════════════════════════════════
-->

/* === END THEME-TOKENS === */
/* === BEGIN RESET === */
/* ── RESET ── */
* { box-sizing:border-box; margin:0; padding:0; }
html, body { min-height:100vh; background:var(--c-bg); }
body { font-family:'DM Mono',monospace; color:var(--c-text); -webkit-font-smoothing:antialiased; }

/* === END RESET === */
/* === BEGIN APP-SHELL === */
/* ── APP SHELL ── */
.app { max-width:540px; margin:0 auto; min-height:100vh; background:radial-gradient(ellipse at 30% 0%, var(--c-surface-1) 0%, var(--c-bg) 70%); position:relative; }
.header { z-index:100; background:rgba(10,10,12,0.94); backdrop-filter:blur(12px); border-bottom:1px solid var(--c-border-dim); box-shadow:0 1px 0 0 #ffffff08; padding:0; }
.sticky-chrome { position:sticky; top:0; z-index:99; background:var(--c-bg); filter:brightness(var(--c-ui-bright)); }
.header-title-row { display:flex; align-items:flex-start; justify-content:space-between; padding:20px 20px 6px; }
.header-title { font-family:'Cormorant Garamond',serif; font-size:1.72rem; font-weight:300; letter-spacing:0.08em; color:var(--c-gold); padding-bottom:6px; border-bottom:1px solid var(--c-gold-warm-44); display:inline-block; text-shadow:0 0 18px var(--c-gold-warm-44); }
.header-sub { font-size:0.52rem; letter-spacing:0.18em; color:var(--c-slate); text-transform:uppercase; margin-top:3px; display:flex; align-items:center; gap:10px; }
.content { padding:16px 16px 80px; }

/* === END APP-SHELL === */
/* === BEGIN SAVE-PILL === */
/* ── SAVE PILL ── */
.save-pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.5rem; letter-spacing:0.14em; border:1px solid var(--c-border-mid); color:var(--c-slate); transition:all 0.3s; }
.save-pill.on { border-color:var(--c-amethyst-55); color:var(--c-amethyst); }
.backup-btn { background:none; border:1px solid var(--c-border-mid); color:var(--c-slate); font-family:'DM Mono',monospace; font-size:0.5rem; letter-spacing:0.1em; padding:2px 8px; border-radius:10px; cursor:pointer; transition:all 0.2s; }
.backup-btn:hover { border-color:var(--c-slate); color:var(--c-teal); }

/* === END SAVE-PILL === */
/* === BEGIN TAB-BAR === */
/* ── TAB BAR — bordered draggable tabs ── */
.tab-bar { display:flex; align-items:flex-end; padding:0 16px; position:relative; }
.tab-bar::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:var(--c-border-mid); z-index:0; transition:background 0.25s, box-shadow 0.25s; }
.tab-bar.drag-active::after { background:var(--c-teal-33); box-shadow:0 0 8px 2px var(--c-teal-22); }
.tab {
  position:relative; z-index:1;
  background:var(--c-surface-0);
  border:1px solid var(--c-border-dim);
  border-bottom-color:var(--c-border-mid);
  border-radius:6px 6px 0 0;
  color:var(--c-slate);
  font-family:'DM Mono',monospace; font-size:0.52rem;
  letter-spacing:0.1em; text-transform:uppercase;
  padding:5px 11px 6px;
  cursor:pointer; white-space:nowrap;
  transition:color 0.15s, border-color 0.15s, background 0.15s;
  margin-right:-1px;
  user-select:none;
}
.tab:hover { color:var(--c-text); border-color:var(--c-border-mid); background:var(--c-surface-1); z-index:2; }
.tab.active {
  z-index:3;
  background:var(--c-surface-1);
  border-color:var(--c-border-mid);
  border-bottom-color:var(--c-surface-1);
  color:var(--c-teal-hi);
  padding-top:7px;
}
.tab.active::before {
  content:''; position:absolute; top:0; left:20%; right:20%; height:1px;
  background:linear-gradient(90deg, transparent, var(--c-teal-44), transparent);
  border-radius:1px; pointer-events:none;
}
.tab.drag-over { border-color:var(--c-teal-55); color:var(--c-teal); z-index:4; }
.tab.drag-over::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--c-teal-hi),transparent); box-shadow:0 0 10px 2px var(--c-teal-55); border-radius:2px; pointer-events:none; z-index:5; }
.tab.dragging {
  opacity:0.9;
  border-color:var(--c-teal-55);
  color:var(--c-teal-hi);
  z-index:10;
  animation:tab-breathe 0.9s ease-in-out infinite;
}
@keyframes tab-breathe {
  0%,100% { box-shadow:0 0 4px 1px var(--c-teal-22); transform:scale(1.0); }
  50%      { box-shadow:0 0 14px 3px var(--c-teal-44); transform:scale(1.08); }
}
@keyframes tabSlideInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
@keyframes tabSlideInLeft  { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
.content.slide-in-right { animation:tabSlideInRight 0.2s linear both; }
.content.slide-in-left  { animation:tabSlideInLeft  0.2s linear both; }

/* ── TAB ORB ROW — reorder affordance ── */
.tab-orb-row { display:flex; align-items:center; padding:8px 16px 6px; gap:0; }
.tab-orb-slot {
  display:flex; align-items:center; justify-content:center;
  padding:10px 0 10px;
  cursor:grab;
  user-select:none;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  min-width:44px;
  box-sizing:border-box;
}
.tab-orb-slot:active { cursor:grabbing; }
.tab-orb {
  width:9px; height:9px; border-radius:50%;
  background:var(--orb-c, var(--c-slate));
  box-shadow:0 0 4px 0 var(--orb-c, var(--c-slate)),
             inset 0 0 2px 0 #ffffff22;
  opacity:0.55;
  transition:transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
  pointer-events:none;
}
.tab-orb-slot.active .tab-orb {
  width:13px; height:13px;
  opacity:1;
  box-shadow:0 0 8px 1px var(--orb-c, var(--c-teal-hi)),
             0 0 14px 3px color-mix(in srgb, var(--orb-c, var(--c-teal-hi)) 45%, transparent),
             inset 0 0 2px 0 #ffffff44;
  animation:orb-pulse 2.4s ease-in-out infinite;
}
@keyframes orb-pulse {
  0%,100% { box-shadow:0 0 8px 1px var(--orb-c, var(--c-teal-hi)),
                       0 0 14px 3px color-mix(in srgb, var(--orb-c, var(--c-teal-hi)) 45%, transparent),
                       inset 0 0 2px 0 #ffffff44; }
  50%     { box-shadow:0 0 10px 2px var(--orb-c, var(--c-teal-hi)),
                       0 0 18px 5px color-mix(in srgb, var(--orb-c, var(--c-teal-hi)) 55%, transparent),
                       inset 0 0 2px 0 #ffffff66; }
}
.tab-orb-slot.dragging .tab-orb {
  transform:scale(1.25);
  opacity:1;
  box-shadow:0 0 12px 3px var(--orb-c, var(--c-teal-hi)),
             0 0 22px 6px color-mix(in srgb, var(--orb-c, var(--c-teal-hi)) 55%, transparent);
}
.tab-orb-slot.drag-over .tab-orb {
  transform:scale(1.15);
  opacity:0.85;
}
.tab-orb-slot.drag-over::after {
  content:''; position:absolute; bottom:-3px; left:10%; right:10%; height:2px;
  background:var(--orb-c, var(--c-teal-hi));
  box-shadow:0 0 6px 1px var(--orb-c, var(--c-teal-hi));
  border-radius:2px; pointer-events:none;
}

/* ── FREE-FLOATING DRAG STATE ── */
/* When the tab-bar / orb-row has .drag-active, all non-dragged tabs+orbs dim and
   slide smoothly as the dragged pair (kept vibrant) is translated by JS. */
.tab-bar.drag-active .tab:not(.dragging) {
  opacity:0.32;
  filter:saturate(0.4);
  transition:transform 0.22s cubic-bezier(0.34,1.4,0.64,1), opacity 0.18s, filter 0.18s;
}
.tab-orb-row.drag-active .tab-orb-slot:not(.dragging) {
  transition:transform 0.22s cubic-bezier(0.34,1.4,0.64,1);
}
.tab-orb-row.drag-active .tab-orb-slot:not(.dragging) .tab-orb {
  opacity:0.32;
  filter:saturate(0.4);
  transform:scale(0.88);
  transition:transform 0.18s, opacity 0.18s, filter 0.18s;
}
/* The dragged tab+orb pair are translated by JS — no CSS transition during drag
   so they track the finger 1:1. CSS overrides the breathing animation. */
.tab.dragging.free-drag {
  animation:none;
  transition:none;
  z-index:50;
  opacity:1;
  filter:none;
  pointer-events:none;
}
.tab-orb-slot.dragging.free-drag {
  transition:none;
  z-index:50;
  pointer-events:none;
}
.tab-orb-slot.dragging.free-drag .tab-orb {
  opacity:1;
  filter:none;
}
/* On release, the snap-back to grid uses a brief ease */
.tab.dragging.snap-back,
.tab-orb-slot.dragging.snap-back {
  transition:transform 0.18s cubic-bezier(0.34,1.4,0.64,1);
}

/* === END TAB-BAR === */
/* === BEGIN CAPSULE === */
/* ── CAPSULE ── */
.capsule-outer-wrap { padding:6px 0 6px; filter:brightness(var(--c-glow-bright)); }
.capsule-outer {
  width:calc(100% - 56px); margin:0 28px;
  border-radius:68px; padding:4px;
  box-sizing:border-box; position:relative;
  border:1px solid var(--c-cap-32);
  animation: cap-crackle 3.8s ease-in-out infinite;
  overflow:visible;
  opacity:calc(var(--c-capsule-alpha) / 100);
}
/* standby: static dim border, no pulse, no border animation */
.capsule-outer.standby { animation:none; border-color:var(--c-cap-18); }
@keyframes cap-crackle {
  0%,100% { border-color:var(--c-cap-28); box-shadow:0 0 6px -2px var(--c-cap-18), 0 0 20px -8px var(--c-cap-10); }
  40%     { border-color:var(--c-cap-50); box-shadow:0 0 10px -2px var(--c-cap-30), 0 0 28px -6px var(--c-cap-22); }
  70%     { border-color:var(--c-cap-3a); box-shadow:0 0 8px -2px var(--c-cap-22), 0 0 22px -7px var(--c-cap-15); }
}
/* wake: slow tube-amp rise, holds lit until all tasks cleared */
.capsule-outer.wake { animation: cap-wake-rise 2.8s cubic-bezier(0.2,0,0.4,1) forwards; }
@keyframes cap-wake-rise {
  0%   { border-color:var(--c-cap-18); box-shadow:none; }
  30%  { border-color:var(--c-cap-33); box-shadow:0 0 4px -2px var(--c-cap-18); }
  65%  { border-color:var(--c-cap-55); box-shadow:0 0 8px -1px var(--c-cap-33), 0 0 20px -6px var(--c-cap-22); }
  100% { border-color:var(--c-cap-66); box-shadow:0 0 10px -1px var(--c-cap-44), 0 0 28px -4px var(--c-cap-28), 0 0 48px -10px var(--c-cap-18); }
}
/* dimming: tiny pulse acknowledgement then slow fade to standby */
.capsule-outer.dimming { animation: cap-dim 3.2s cubic-bezier(0.6,0,1,0.8) forwards; }
@keyframes cap-dim {
  0%   { border-color:var(--c-cap-66); box-shadow:0 0 10px -1px var(--c-cap-44), 0 0 28px -4px var(--c-cap-28), 0 0 48px -10px var(--c-cap-18); }
  12%  { border-color:var(--c-cap-aa); box-shadow:0 0 14px 0px var(--c-cap-55), 0 0 36px -2px var(--c-cap-33), 0 0 60px -8px var(--c-cap-22); }
  28%  { border-color:var(--c-cap-66); box-shadow:0 0 10px -1px var(--c-cap-44), 0 0 28px -4px var(--c-cap-28), 0 0 48px -10px var(--c-cap-18); }
  100% { border-color:var(--c-cap-18); box-shadow:none; }
}
@property --spark-a { syntax:"<angle>"; inherits:false; initial-value:0deg; }
@keyframes spark-spin { to { --spark-a:360deg; } }
.capsule-outer::before {
  content:''; position:absolute; inset:0; border-radius:68px;
  pointer-events:none; z-index:2;
  background: conic-gradient(from var(--spark-a), transparent 0deg, transparent 346deg,
    #00182800 350deg, #1a8aaa33 354deg, #22b8cc88 357deg, var(--c-cap-dd) 359deg,
    var(--c-cap-hi) 359.6deg, var(--c-cap-dd) 360deg);
  mask: radial-gradient(farthest-side at center, transparent 0%, transparent calc(100% - 5px), black calc(100% - 4px), black 100%);
  -webkit-mask: radial-gradient(farthest-side at center, transparent 0%, transparent calc(100% - 5px), black calc(100% - 4px), black 100%);
  animation: spark-spin 6s linear infinite;
}
/* standby + wake + dimming: kill the rotating spark entirely */
.capsule-outer.standby::before,
.capsule-outer.wake::before,
.capsule-outer.dimming::before { display:none; }
.capsule-strip {
  border-radius:64px; background:var(--c-capsule-bg);
  border:1px solid var(--c-cap-32);
  animation: cap-gap 3.8s ease-in-out infinite;
  overflow:hidden; position:relative; z-index:3;
}
/* standby: strip stays solid, no dim, no animation */
.capsule-strip.standby { animation:none; border-color:var(--c-cap-18); }
/* wake: inner border rises in sync with outer, holds lit */
.capsule-strip.wake { animation: cap-gap-wake-rise 2.8s cubic-bezier(0.2,0,0.4,1) forwards; }
@keyframes cap-gap-wake-rise {
  0%   { border-color:var(--c-cap-18); }
  30%  { border-color:var(--c-cap-28); }
  65%  { border-color:var(--c-cap-44); }
  100% { border-color:var(--c-cap-66); }
}
/* dimming: pulse then fade in sync with outer */
.capsule-strip.dimming { animation: cap-gap-dim 3.2s cubic-bezier(0.6,0,1,0.8) forwards; }
@keyframes cap-gap-dim {
  0%   { border-color:var(--c-cap-66); }
  12%  { border-color:var(--c-cap-aa); }
  28%  { border-color:var(--c-cap-66); }
  100% { border-color:var(--c-cap-18); }
}
@keyframes cap-gap { 0%,100%{border-color:var(--c-cap-32);} 40%{border-color:var(--c-cap-58);} 70%{border-color:var(--c-cap-40);} }

/* ── CAPSULE PARTICLES ── */
.cap-particle-wrap { position:absolute; inset:-4px; pointer-events:none; overflow:visible; z-index:20; }
/* base: all particles invisible until positioned */
.cap-p { position:absolute; font-size:6px; pointer-events:none; opacity:0; line-height:1; animation:cap-drift ease-out infinite; }
@keyframes cap-drift { 0%{opacity:0;transform:translate(0,0) scale(0.8);} 20%{opacity:0.9;} 100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0.1);} }
/* active (timer running) — all along top edge */
.cap-p.p1{top:0;left:15%;--px:-5px;--py:-10px;animation-duration:3.2s;animation-delay:0.0s;color:var(--c-teal);text-shadow:0 0 3px var(--c-teal),0 0 8px var(--c-teal-deep);}
.cap-p.p3{top:0;left:54%;--px:3px;--py:-11px;animation-duration:3.6s;animation-delay:1.5s;color:var(--c-teal-hi);text-shadow:0 0 3px var(--c-teal),0 0 8px var(--c-teal-deep);}
.cap-p.p5{top:0;left:88%;--px:8px;--py:-9px;animation-duration:2.6s;animation-delay:0.4s;color:var(--c-teal);text-shadow:0 0 3px var(--c-teal),0 0 8px var(--c-teal-deep);}
.cap-p.p7{top:0;left:46%;--px:1px;--py:12px;animation-duration:2.9s;animation-delay:1.9s;color:var(--c-teal-hi);text-shadow:0 0 3px var(--c-teal),0 0 8px var(--c-teal-deep);}
.cap-p.p2{top:0;left:32%;--px:-2px;--py:-12px;animation-duration:2.8s;animation-delay:0.8s;font-size:4px;color:var(--c-amethyst);text-shadow:0 0 3px var(--c-amethyst),0 0 8px var(--c-amethyst);}
.cap-p.p4{top:0;left:72%;--px:6px;--py:-10px;animation-duration:3.0s;animation-delay:2.2s;font-size:4px;color:var(--c-amethyst);text-shadow:0 0 3px var(--c-amethyst),0 0 8px var(--c-amethyst);}
.cap-p.p6{top:0;left:22%;--px:-6px;--py:10px;animation-duration:3.4s;animation-delay:1.1s;font-size:4px;color:var(--c-amethyst);text-shadow:0 0 3px var(--c-amethyst),0 0 8px var(--c-amethyst);}
.cap-p.p8{top:0;left:66%;--px:7px;--py:11px;animation-duration:3.7s;animation-delay:0.6s;font-size:4px;color:var(--c-amethyst);text-shadow:0 0 3px var(--c-amethyst),0 0 8px var(--c-amethyst);}
/* standby — particles spread to all four sides, slower + dreamier */
/* top edge */
.standby .cap-p.p1{top:2px;left:22%;--px:-6px;--py:-14px;animation-duration:5.0s;animation-delay:0.0s;font-size:7px;}
.standby .cap-p.p3{top:2px;left:68%;--px:4px;--py:-13px;animation-duration:5.8s;animation-delay:1.2s;font-size:5px;}
/* bottom edge */
.standby .cap-p.p5{bottom:2px;top:auto;left:35%;--px:-4px;--py:14px;animation-duration:5.4s;animation-delay:0.6s;font-size:7px;}
.standby .cap-p.p7{bottom:2px;top:auto;left:62%;--px:5px;--py:13px;animation-duration:4.8s;animation-delay:2.0s;font-size:5px;}
/* left side */
.standby .cap-p.p2{top:40%;left:2px;--px:-14px;--py:-4px;animation-duration:5.2s;animation-delay:0.4s;font-size:6px;}
.standby .cap-p.p6{top:55%;left:2px;--px:-13px;--py:5px;animation-duration:6.0s;animation-delay:1.8s;font-size:4px;}
/* right side */
.standby .cap-p.p4{top:40%;right:2px;left:auto;--px:14px;--py:-4px;animation-duration:5.6s;animation-delay:0.9s;font-size:6px;}
.standby .cap-p.p8{top:55%;right:2px;left:auto;--px:13px;--py:5px;animation-duration:4.6s;animation-delay:2.5s;font-size:4px;}

/* ── CAPSULE: TIMER FACE ── */
.cap-face-timer { padding:10px 14px 12px; }
.mana-bar-wrap { margin:0 12px 4px; }
.mana-bar-track { position:relative; height:10px; background:#06080a; border-radius:5px; overflow:hidden; border:1px solid var(--c-border-dim); }
/* fill = the lit room. fireflies live inside and are clipped to progress width */
.mana-bar-fill {
  position:absolute; top:0; left:0; height:100%;
  background:linear-gradient(90deg, #071418 0%, #0c2228 60%, #0e2a30 100%);
  transition:width 0.5s ease; overflow:hidden;
  /* right-edge glow: the "door crack" threshold line */
  box-shadow: inset -1px 0 0 0 var(--c-teal-44), inset -3px 0 8px 0 var(--c-teal-18);
}
.mana-bar-fill.full {
  background:linear-gradient(90deg, #100718 0%, #1a0b2e 60%, #1e0f35 100%);
  box-shadow: inset -1px 0 0 0 var(--c-amethyst-55), inset -3px 0 8px 0 var(--c-amethyst-18);
}
/* firefly: tiny glowing dot, drifts + pulses on independent rhythms */
.mana-f {
  position:absolute; width:2px; height:2px; border-radius:50%;
  background:var(--c-teal-hi); box-shadow:0 0 4px 1px var(--c-teal);
  pointer-events:none; opacity:0;
  animation:
    mf-drift var(--mf-dur) var(--mf-ease) var(--mf-delay) infinite,
    mf-glow  var(--mf-gdur) ease-in-out var(--mf-gdel) infinite;
}
.mana-bar-fill.full .mana-f { background:var(--c-amethyst); box-shadow:0 0 4px 1px var(--c-amethyst); }
@keyframes mf-drift {
  0%   { transform:translate(var(--x0),var(--y0)); }
  25%  { transform:translate(var(--x1),var(--y1)); }
  50%  { transform:translate(var(--x2),var(--y2)); }
  75%  { transform:translate(var(--x3),var(--y3)); }
  100% { transform:translate(var(--x0),var(--y0)); }
}
@keyframes mf-glow {
  0%,100% { opacity:0; }
  30%,70% { opacity:var(--pk); }
  50%     { opacity:calc(var(--pk)*0.45); }
}
/* 16 fireflies spanning the full interior — clipped to fill width at runtime */

.mana-f.f1  {left: 5%;top:30%;--x0:0px;--y0:0px;--x1: 5px;--y1: 2px;--x2:-3px;--y2:-3px;--x3: 2px;--y3: 3px;--mf-dur:7.4s;--mf-ease:ease-in-out;--mf-delay:0.0s;--mf-gdur:2.8s;--mf-gdel:0.0s;--pk:0.95;}

.mana-f.f3  {left:21%;top:15%;--x0:0px;--y0:0px;--x1: 3px;--y1: 3px;--x2:-5px;--y2:-2px;--x3: 4px;--y3: 1px;--mf-dur:8.1s;--mf-ease:ease-in-out;--mf-delay:0.7s;--mf-gdur:4.1s;--mf-gdel:0.9s;--pk:0.88;}

.mana-f.f5  {left:36%;top:45%;--x0:0px;--y0:0px;--x1:-5px;--y1: 3px;--x2: 3px;--y2:-3px;--x3: 5px;--y3: 2px;--mf-dur:10.3s;--mf-ease:ease-in-out;--mf-delay:0.4s;--mf-gdur:4.8s;--mf-gdel:3.4s;--pk:0.72;}
.mana-f.f6  {left:44%;top:20%;--x0:0px;--y0:0px;--x1: 4px;--y1:-2px;--x2:-2px;--y2: 3px;--x3:-4px;--y3:-2px;--mf-dur:7.8s;--mf-ease:ease-in-out;--mf-delay:2.0s;--mf-gdur:3.0s;--mf-gdel:0.5s;--pk:0.90;}
